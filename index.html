<!doctype html>
<html lang="ko" data-theme="dark" data-color="warm">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Focus Desk — Pomodoro + Todo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260709" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand__mark" aria-hidden="true"></span>
        <div>
          <span class="brand__title">Focus Desk</span>
          <span class="brand__subtitle">Pomodoro · Todo</span>
        </div>
      </div>
      <div class="topbar__actions">
        <button id="themeToggleBtn" class="btn btn--icon" type="button" title="다크/라이트 전환" aria-label="테마 전환">
          <span class="theme-icon theme-icon--dark" aria-hidden="true">☀</span>
          <span class="theme-icon theme-icon--light" aria-hidden="true">☾</span>
        </button>
        <button id="settingsBtn" class="btn btn--ghost" type="button" aria-expanded="false" aria-controls="settingsPanel">
          설정
        </button>
        <button id="resetAllBtn" class="btn btn--ghost" type="button">전체 초기화</button>
      </div>
    </header>

    <div id="settingsPanel" class="settings is-hidden" role="region" aria-label="설정">
      <div class="settings__inner card">
        <h3 class="settings__title">설정</h3>
        <div class="settings__grid">
          <div class="settings__field">
            <label for="colorThemeSelect">배경 테마</label>
            <select id="colorThemeSelect" class="settings__select">
              <option value="warm">웜 포커스</option>
              <option value="ocean">오션 블루</option>
              <option value="forest">포레스트</option>
              <option value="sunset">선셋</option>
              <option value="lavender">라벤더</option>
            </select>
          </div>
          <div class="settings__field settings__field--row">
            <label for="notifyToggle">타이머 종료 알림</label>
            <label class="switch">
              <input id="notifyToggle" type="checkbox" checked />
              <span class="switch__slider"></span>
            </label>
          </div>
          <div class="settings__field settings__field--row">
            <label for="soundToggle">종료 사운드</label>
            <label class="switch">
              <input id="soundToggle" type="checkbox" checked />
              <span class="switch__slider"></span>
            </label>
          </div>
          <div class="settings__field">
            <button id="notifyPermBtn" class="btn btn--secondary btn--full" type="button">
              브라우저 알림 권한 요청
            </button>
            <p id="notifyStatus" class="settings__hint">알림 권한: 확인 중</p>
          </div>
        </div>
      </div>
    </div>

    <main class="layout">
      <section class="card timer-card" aria-label="포모도로 타이머">
        <div class="timer-card__top">
          <div>
            <p class="eyebrow">Time Timer Style</p>
            <h2>포모도로 타이머</h2>
          </div>
          <div class="seg" role="tablist" aria-label="프리셋">
            <button class="seg__item is-active" type="button" data-preset="pomodoro">25분</button>
            <button class="seg__item" type="button" data-preset="short">5분</button>
            <button class="seg__item" type="button" data-preset="long">15분</button>
            <button class="seg__item" type="button" data-preset="custom">커스텀</button>
          </div>
        </div>

        <div class="timer-card__body">
          <div class="time-timer" aria-label="남은 시간 시각화">
            <div class="time-timer__shell">
              <div class="time-timer__bezel">
                <svg id="dialSvg" class="time-timer__svg" viewBox="0 0 240 240" aria-hidden="true">
                  <circle class="dial__bg" cx="120" cy="120" r="108" />
                  <g id="dialTicks"></g>
                  <g id="dialNumbers"></g>
                  <path id="redWedge" class="dial__wedge" d="" />
                  <circle class="dial__inner-ring" cx="120" cy="120" r="108" />
                </svg>
                <div class="time-timer__hub">
                  <div id="timeText" class="time" aria-live="polite">25:00</div>
                  <div id="timerLabel" class="time-label">Pomodoro</div>
                </div>
              </div>
            </div>
          </div>

          <div id="sessionStats" class="session-stats">
            <span>오늘 완료 <strong id="sessionCount">0</strong>세션</span>
            <span class="dot">·</span>
            <span>총 집중 <strong id="sessionMinutes">0</strong>분</span>
          </div>

          <form id="customForm" class="custom is-hidden" autocomplete="off">
            <div class="field">
              <label for="customMin">분</label>
              <input id="customMin" inputmode="numeric" pattern="[0-9]*" placeholder="30" />
            </div>
            <div class="field">
              <label for="customSec">초</label>
              <input id="customSec" inputmode="numeric" pattern="[0-9]*" placeholder="00" />
            </div>
            <button class="btn btn--primary" type="submit">적용</button>
          </form>

          <div class="timer-card__controls">
            <button id="startPauseBtn" class="btn btn--start" type="button">시작</button>
            <button id="resetTimerBtn" class="btn btn--secondary" type="button">리셋</button>
          </div>

          <p class="hint">Space 시작/일시정지 · R 리셋 · 빨간 영역이 줄어들며 시간이 흐릅니다</p>
        </div>
      </section>

      <section class="card todo-card todo-card--v2" aria-label="할 일 목록">
        <div class="todo-dashboard">
          <div class="todo-dashboard__top">
            <div>
              <p id="todoGreeting" class="todo-greeting">오늘 할 일을 확인해보세요</p>
              <div class="todo-progress">
                <div class="todo-progress__bar">
                  <div id="todoProgressFill" class="todo-progress__fill"></div>
                </div>
                <span id="todoProgressText" class="todo-progress__text">0/0</span>
              </div>
            </div>
            <button id="openTodoModalBtn" class="btn btn--add" type="button">+ 새 스케줄</button>
          </div>

          <div class="dday-section">
            <div class="dday-section__head">
              <h3>D-Day 임박</h3>
              <button id="openDdayModalBtn" class="link" type="button">+ 목표 추가</button>
            </div>
            <div id="ddayList" class="dday-list"></div>
          </div>

          <div class="week-strip" id="weekStrip" aria-label="주간 날짜 선택"></div>

          <div class="todo__filters" role="tablist" aria-label="분류">
            <button class="chip is-active" type="button" data-filter="all">전체</button>
            <button class="chip" type="button" data-filter="daily">매일</button>
            <button class="chip" type="button" data-filter="short">단기</button>
            <button class="chip" type="button" data-filter="long">장기</button>
            <button class="chip" type="button" data-filter="done">완료</button>
          </div>
        </div>

        <div id="todoScheduleList" class="schedule-list" aria-label="스케줄 리스트"></div>

        <div id="emptyState" class="empty is-hidden">
          <span class="empty__icon" aria-hidden="true">📋</span>
          <p>이 날짜에 스케줄이 없어요.<br />'+ 새 스케줄'로 추가해보세요.</p>
        </div>

        <p class="drag-hint">카드 왼쪽 ≡ 드래그로 순서 변경 · 제목 더블클릭 수정</p>
      </section>
    </main>

    <!-- 새 스케줄 모달 -->
    <div id="todoModal" class="modal is-hidden" role="dialog" aria-modal="true" aria-labelledby="todoModalTitle">
      <div class="modal__backdrop" data-close-modal></div>
      <div class="modal__panel card">
        <div class="modal__header">
          <h3 id="todoModalTitle">새 스케줄</h3>
          <button class="modal__close" type="button" data-close-modal aria-label="닫기">×</button>
        </div>
        <form id="todoForm" class="modal__form" autocomplete="off">
          <div class="form-seg" role="tablist">
            <button class="form-seg__item is-active" type="button" data-category="daily">매일</button>
            <button class="form-seg__item" type="button" data-category="short">단기</button>
            <button class="form-seg__item" type="button" data-category="long">장기</button>
          </div>
          <input type="hidden" id="todoCategory" value="daily" />

          <div class="field">
            <label for="todoTitle">제목</label>
            <input id="todoTitle" maxlength="80" placeholder="예: 영어 단어 30개 암기" required />
          </div>

          <div class="field">
            <label for="todoDesc">설명</label>
            <textarea id="todoDesc" rows="3" maxlength="200" placeholder="상세 내용을 입력하세요"></textarea>
          </div>

          <label class="check-row">
            <input id="todoImportant" type="checkbox" />
            <span>중요 스케줄</span>
          </label>

          <div class="field-row">
            <div class="field">
              <label for="todoDate">날짜</label>
              <input id="todoDate" type="date" required />
            </div>
            <div class="field">
              <label for="todoEndDate">종료일 <span class="optional">(장기)</span></label>
              <input id="todoEndDate" type="date" />
            </div>
          </div>

          <div class="field-row">
            <div class="field">
              <label for="todoTimeStart">시작</label>
              <input id="todoTimeStart" type="time" value="09:00" />
            </div>
            <div class="field">
              <label for="todoTimeEnd">종료</label>
              <input id="todoTimeEnd" type="time" value="10:00" />
            </div>
          </div>

          <button class="btn btn--register" type="submit">등록</button>
        </form>
      </div>
    </div>

    <!-- D-Day 모달 -->
    <div id="ddayModal" class="modal is-hidden" role="dialog" aria-modal="true" aria-labelledby="ddayModalTitle">
      <div class="modal__backdrop" data-close-dday></div>
      <div class="modal__panel card modal__panel--sm">
        <div class="modal__header">
          <h3 id="ddayModalTitle">D-Day 목표</h3>
          <button class="modal__close" type="button" data-close-dday aria-label="닫기">×</button>
        </div>
        <form id="ddayForm" class="modal__form" autocomplete="off">
          <div class="field">
            <label for="ddayTitle">목표 이름</label>
            <input id="ddayTitle" maxlength="60" placeholder="예: 자격증 시험" required />
          </div>
          <div class="field">
            <label for="ddayDate">목표 날짜</label>
            <input id="ddayDate" type="date" required />
          </div>
          <button class="btn btn--register" type="submit">추가</button>
        </form>
      </div>
    </div>

    <footer class="footer">타이머와 할 일은 브라우저에 자동 저장됩니다</footer>

  </body>
</html>
